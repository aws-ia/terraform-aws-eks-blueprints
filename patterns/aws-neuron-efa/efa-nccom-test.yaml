apiVersion: kubeflow.org/v2beta1
kind: MPIJob
metadata:
  name: nccom-test
spec:
  runPolicy:
    cleanPodPolicy: Running
    backoffLimit: 20
  slotsPerWorker: 16
  mpiReplicaSpecs:
    Launcher:
      replicas: 1
      template:
         spec:
          restartPolicy: OnFailure
          tolerations:
          - key: "aws.amazon.com/neuron"
            operator: "Equal"
            value: "true"
            effect: "NoSchedule"
          containers:
          - image: ${IMAGE_URI}
            name: nccom-test-launcher
            imagePullPolicy: IfNotPresent
            command:
            - /opt/amazon/openmpi/bin/mpirun
            - --allow-run-as-root
            - --tag-output
            - -np
            - "32"
            - -bind-to
            - none
            - -map-by
            - slot
            - --mca
            - pml
            - ^cm
            - --mca
            - pml_rsh_agent=ssh
            - --oversubscribe
            - /opt/amazon/efa/bin/fi_info
            - -p
            - "efa"
            - -t
            - "FI_EP_RDM"
    Worker:
      replicas: 2
      template:
        spec:
          containers:
          - image: xxx
            name: nccom-test-worker
            imagePullPolicy: IfNotPresent
            resources:
              limits:
                aws.amazon.com/neuron: 16
                vpc.amazonaws.com/efa: 16
              requests:
                aws.amazon.com/neuron: 16
                vpc.amazonaws.com/efa: 16
            volumeMounts:
              - name: dshm
                mountPath: /dev/shm
          volumes:
          - name: dshm
            emptyDir:
              medium: Memory
